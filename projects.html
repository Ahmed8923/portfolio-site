<!-- Project timeline page that displays portfolio work and opens project details in a modal. -->
<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ahmed Portfolio</title>

    <!-- ✅ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="Stylesheet/style.css" />
    <link rel="stylesheet" href="Stylesheet/projects.css" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body class=" text-white">
    <!-- ✅ Main Navbar (Responsive) -->
    <nav class="navbar navbar-expand-lg bg-dark shadow-sm">
        <div class="container">
            <!-- Left: Name -->
            <a class="navbar-brand fw-bold text-danger" href="index.html">
                Ahmed Banna
            </a>

            <!-- Mobile Toggle Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Collapsible Content -->
            <div class="collapse navbar-collapse justify-content-between" id="navbarContent">
                <!-- Center: Links -->
                <ul class="navbar-nav mx-auto gap-lg-4 text-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold text-danger" href="projects.html">Projects</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="connect.html">Connect</a>
                    </li>
                </ul>

                <!-- Right: Social Icons -->
                <div class="d-flex justify-content-center gap-3 mt-3 mt-lg-0">
                    <a href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer" class="social-icon"><i
                            class="bi bi-linkedin"></i></a>
                    <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer"
                        class="social-icon"><i class="bi bi-instagram"></i></a>
                    <a href="mailto:ahmedbanna@example.com" class="social-icon"><i class="bi bi-envelope"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <main class="fade-up">

        <section class="projects-page py-5">
            <div class="container">
                <h1 class="text-center fw-bold mb-5">
                    My Projects <span class="text-danger">Timeline</span>
                </h1>

                <div class="container mb-4">

                    <!-- TYPE FILTER -->
                    <div class="mb-3 text-center">
                        <button class="btn active btn-outline-light me-2 filter-btn" data-filter="all">All</button>
                        <button class="btn btn-outline-light me-2 filter-btn" data-filter="college">College</button>
                        <button class="btn btn-outline-light me-2 filter-btn" data-filter="own">Own</button>
                    </div>

                    <!-- CATEGORY FILTER -->
                    <div class="text-center">
                        <button class="btn active btn-sm btn-outline-light me-2 cat-btn" data-cat="all">All</button>
                        <button class="btn btn-sm btn-outline-light me-2 cat-btn" data-cat="web">Web</button>
                        <button class="btn btn-sm btn-outline-light me-2 cat-btn" data-cat="game">Game</button>
                        <button class="btn btn-sm btn-outline-light me-2 cat-btn" data-cat="database">Database</button>
                        <button class="btn btn-sm btn-outline-light me-2 cat-btn" data-cat="research">Research</button>
                    </div>
                </div>

                <div class="timeline" id="timeline"></div>
            </div>
        </section>

        <div id="projectModal" class="project-modal">

            <div class="modal-content">

                <span class="close-btn" onclick="closeModal()">&times;</span>

                <div id="modal-body"></div>

            </div>



        </div>

        <!--- Footer -->
        <footer class="footer py-4">
            <div
                class="container d-flex flex-column flex-md-row justify-content-between align-items-center text-center text-md-start">

                <p class="mb-3 mb-md-0">
                    © 2026 Ahmed Banna. Built with <span class="heart">❤</span> & Ai.
                </p>

            </div>
        </footer>
    </main>

    <!-- ✅ Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/background.js"></script>
    <script src="js/timeline-projects.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/project-model.js"></script>
</body>

</html>
